<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HAMOUZI - Compress Tool</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: gold; text-align: center; min-height: 100vh; position: relative; }
        body::after { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; border: 4px solid rgba(255, 215, 0, 0.4); box-shadow: inset 0 0 25px rgba(255, 215, 0, 0.3); pointer-events: none; }
        .container { padding: 50px; }
        input[type="range"] { width: 300px; accent-color: gold; }
        .btn { padding: 15px 40px; border-radius: 15px; border: 1px solid gold; background: transparent; color: gold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: gold; color: #000; }
        h1 { font-size: 50px; text-shadow: 0 0 15px gold; }
        .val { font-size: 24px; margin: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Compress Image</h1>
        <p>قلل حجم الصورة مع الحفاظ على الجودة</p>
        <div style="margin: 40px;">
            <input type="file" class="btn" style="margin-bottom: 20px;"><br>
            <input type="range" min="10" max="100" value="80" oninput="document.getElementById('v').innerText = this.value + '%'">
            <div class="val">Quality: <span id="v">80%</span></div>
        </div>
        <button class="btn">Compress Now</button>
        <a href="/" style="color:#fff; display:block; margin-top:20px; text-decoration:none;">← Back to Home</a>
    </div>
</body>
</html>
