<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HAMOUZI</title>
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #000;
            background-image: radial-gradient(circle at center, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .login-card {
            width: 100%; max-width: 400px; padding: 40px; border: 2px solid gold;
            border-radius: 30px; background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); text-align: center;
        }
        .logo { color: gold; font-size: 40px; font-weight: bold; text-shadow: 0 0 15px gold; text-decoration: none; }
        h2 { margin: 20px 0; color: #fff; }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid gold; background: rgba(0,0,0,0.5); color: #fff; outline: none; box-sizing: border-box;
        }
        .submit-btn {
            width: 100%; padding: 15px; margin-top: 20px; border-radius: 10px;
            border: none; background: gold; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { box-shadow: 0 0 20px gold; transform: scale(1.02); }
        .back-link { display: block; margin-top: 20px; color: gold; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="/" class="logo">HAMOUZI</a>
        <h2>Welcome Back</h2>
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="submit-btn">Login</button>
        </form>
        <a href="/" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
