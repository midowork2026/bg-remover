<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .box {
            border: 1px solid gold;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: black;
            border: 1px solid gold;
            color: gold;
            cursor: pointer;
        }

        a {
            display: block;
            margin-top: 15px;
            color: gold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>تسجيل الدخول</h2>

    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">

    <button>Login</button>

    <a href="#">سجل الآن</a>
</div>

</body>
</html>
