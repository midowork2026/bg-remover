<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - HAMOUZI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("/static/bg.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: -1;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            border: 1px solid gold;
            border-radius: 15px;
            text-align: center;
        }

        h2 {
            color: gold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: black;
            border: 1px solid gold;
            color: gold;
            cursor: pointer;
            border-radius: 8px;
        }

        a {
            color: gold;
            text-decoration: none;
        }

        .register {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>تسجيل الدخول</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="اسم المستخدم" required>
        <input type="password" name="password" placeholder="كلمة المرور" required>
        <button type="submit">دخول</button>
    </form>

    <div class="register">
        <p>ليس لديك حساب؟</p>
        <a href="#">سجل الآن</a>
    </div>
</div>

</body>
</html>
