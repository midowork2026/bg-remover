<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>اتصل بنا - HAMOUZI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("{{ url_for('static', filename='bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 30px;
            border: 1px solid gold;
            border-radius: 15px;
            text-align: center;
        }

        h1 {
            color: gold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: gold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        a {
            display: block;
            margin-top: 15px;
            color: gold;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>اتصل بنا</h1>

    <form>
        <input type="text" placeholder="الاسم" required>
        <input type="email" placeholder="البريد الإلكتروني" required>
        <textarea placeholder="اكتب رسالتك..." rows="5"></textarea>
        <button type="submit">إرسال</button>
    </form>

    <a href="/">العودة إلى الصفحة الرئيسية</a>
</div>

</body>
</html>
