<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HAMOUZI - Crop Tool</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: gold; text-align: center; min-height: 100vh; position: relative; }
        body::after { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; border: 4px solid rgba(255, 215, 0, 0.4); box-shadow: inset 0 0 25px rgba(255, 215, 0, 0.3); pointer-events: none; }
        .container { padding: 50px; }
        .box { width: 300px; height: 300px; border: 2px dashed gold; border-radius: 20px; margin: 20px auto; display: flex; align-items: center; justify-content: center; background: rgba(255,215,0,0.05); }
        .btn { padding: 15px 40px; border-radius: 15px; border: 1px solid gold; background: transparent; color: gold; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: gold; color: #000; box-shadow: 0 0 20px gold; }
        h1 { font-size: 50px; text-shadow: 0 0 15px gold; }
        a { color: #fff; text-decoration: none; display: block; margin-top: 20px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Crop Image</h1>
        <p>قم بقص صورك باحترافية</p>
        <div class="box">
            <input type="file" id="cropInput" hidden>
            <label for="cropInput" class="btn">Select Image</label>
        </div>
        <button class="btn">Start Cropping</button>
        <a href="/">← Back to Home</a>
    </div>
</body>
</html>
