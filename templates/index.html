<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مزيل الخلفيات الذكي | إزالة خلفية الصور بالذكاء الاصطناعي</title>
    <meta name="description" content="أداة احترافية ومجانية لإزالة خلفية الصور بدقة عالية في ثوانٍ.">
    <meta name="keywords" content="إزالة خلفية، مسح خلفية، ذكاء اصطناعي، صور شفافة">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --text-main: #1e293b; --text-sub: #64748b; }
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); background-size: 24px 24px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .main-wrapper { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); width: 95%; max-width: 1100px; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); padding: 40px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        header { text-align: center; margin-bottom: 40px; }
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }
        .upload-card { background: white; padding: 30px; border-radius: 20px; border: 2px dashed #cbd5e1; text-align: center; transition: 0.3s; }
        .upload-card:hover { border-color: var(--primary); background: #fdfdff; }
        .custom-file-upload { background: var(--primary); color: white; padding: 15px 30px; border-radius: 12px; cursor: pointer; display: inline-block; font-weight: 700; transition: 0.3s; }
        .result-card { background: white; padding: 20px; border-radius: 20px; min-height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #e2e8f0; }
        .result-image { max-width: 100%; border-radius: 12px; background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%); background-size: 16px 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .info-text { margin-top: 20px; padding: 15px; background: #f1f5f9; border-radius: 12px; font-size: 0.9rem; color: #475569; }
        .btn { border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 700; text-decoration: none; display: inline-block; transition: 0.3s; }
        .dl-btn { background: var(--success); color: white; margin-top: 15px; }
        .submit-btn { background: var(--primary); color: white; width: 100%; margin-top: 15px; }
        @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="main-wrapper">
    <header>
        <h1>✨ محرك الذكاء الاصطناعي المتطور</h1>
        <p>قم بتحميل صورتك وسيقوم الذكاء الاصطناعي بمسح الخلفية بدقة مذهلة</p>
    </header>
    <div class="content-grid">
        <div class="left-side">
            <div class="upload-card">
                <h3>1. ارفع الصورة</h3>
                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <label for="file" class="custom-file-upload">📁 اختيار ملف</label>
                    <input type="file" name="file" id="file" onchange="document.getElementById('fname').innerText = this.files[0].name; document.getElementById('s-btn').style.display='block';">
                    <div id="fname" style="margin: 10px 0; font-weight: bold; color: var(--primary);"></div>
                    <button type="submit" id="s-btn" class="btn submit-btn" style="display:none">بدء المعالجة الذكية</button>
                </form>
            </div>
            <div class="info-text">
                <b>دقة 100%:</b> نستخدم خوارزميات Deep Learning لفصل أدق التفاصيل مثل الشعر والحواف الصعبة.
            </div>
        </div>
        <div class="right-side">
            <div class="result-card">
                {% if result_image %}
                    <img src="data:image/png;base64,{{ result_image }}" class="result-image">
                    <a href="data:image/png;base64,{{ result_image }}" download="ai_image.png" class="btn dl-btn">⬇️ تحميل النتيجة HD</a>
                {% else %}
                    <div style="color: #94a3b8; text-align: center;">
                        <span style="font-size: 50px;">🖼️</span>
                        <p>النتيجة ستظهر هنا</p>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
</body>
</html>
