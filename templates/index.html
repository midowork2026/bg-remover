<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HAMOUZI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle,#111,#000);
    color:white;
    text-align:center;
}

/* LOGO */
.logo{
    font-size:42px;
    color:gold;
    margin-top:20px;
}

/* LOGIN */
.login-btn{
    position:absolute;
    top:20px;
    right:20px;
    border:1px solid gold;
    padding:8px 15px;
    border-radius:10px;
    color:gold;
    text-decoration:none;
}

/* WRAPPER */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    margin-top:40px;
}

/* BOX */
.box{
    width:300px;
    height:420px;
    border:2px solid gold;
    border-radius:160px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* IMPORTANT FIX */
.box::before{
    pointer-events:none;
}

/* AD */
.ad{
    width:120px;
    height:400px;
    border:1px solid rgba(255,215,0,0.2);
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:gold;
}

/* UPLOAD */
.upload-btn{
    margin-top:15px;
    padding:12px 25px;
    border-radius:12px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    cursor:pointer;
}

.upload-btn:hover{
    background:gold;
    color:black;
}

/* TOOLS */
.tools{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.tool-btn{
    width:150px;
    padding:12px;
    border-radius:12px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    cursor:pointer;
}

.tool-btn:hover{
    background:gold;
    color:black;
}

/* REMOVE */
.remove-btn{
    margin-top:30px;
    padding:15px 50px;
    border-radius:15px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    cursor:pointer;
}

/* IMAGE */
.result-img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* DOWNLOAD */
.download-btn{
    position:absolute;
    bottom:20px;
    padding:10px 20px;
    border:1px solid gold;
    border-radius:10px;
    color:gold;
    text-decoration:none;
}

/* FOOTER */
.footer{
    margin-top:25px;
}

.footer a{
    color:gold;
    margin:0 10px;
}
</style>
</head>

<body>

<div class="logo">HAMOUZI</div>
<a href="/login" class="login-btn">تسجيل الدخول</a>

<form id="form" action="/upload" method="POST" enctype="multipart/form-data">

<div class="wrapper">

<div class="ad">AD</div>

<!-- UPLOAD -->
<div class="box">
    <h3>Upload</h3>

    <input type="file" name="file" id="fileInput" hidden required>

    <label for="fileInput" class="upload-btn">رفع الصورة</label>

    <span id="fileName"></span>
</div>

<!-- TOOLS -->
<div class="tools">
    <button type="button" class="tool-btn" onclick="cropImage()">✂️ Crop</button>
    <button type="button" class="tool-btn" onclick="compressImage()">🗜️ Compress</button>
    <button type="button" class="tool-btn" onclick="convertImage()">🔄 Convert</button>
</div>

<!-- PREVIEW -->
<div class="box" id="previewBox">

{% if result_image %}
<img class="result-img" src="data:image/png;base64,{{ result_image }}">

<a download="result.png"
   href="data:image/png;base64,{{ result_image }}"
   class="download-btn">
   Download
</a>

{% else %}
<h3>Preview</h3>
{% endif %}

</div>

<div class="ad">AD</div>

</div>

<button class="remove-btn">Remove Background</button>

</form>

<div class="footer">
<a href="/privacy">سياسة الخصوصية</a> |
<a href="/contact">اتصل بنا</a>
</div>

<script>
let imageFile = null;

document.getElementById("fileInput").addEventListener("change", function(e){
    imageFile = e.target.files[0];

    document.getElementById("fileName").innerText = imageFile.name;

    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById("previewBox").innerHTML =
        <img class="result-img" src="${reader.result}">;
    }
    reader.readAsDataURL(imageFile);
});

/* CROP (قص بسيط من المنتصف) */
function cropImage(){
    if(!imageFile) return alert("ارفع صورة");

    const img = new Image();
    img.onload = function(){
        const canvas = document.createElement("canvas");
        const size = Math.min(img.width, img.height);

        canvas.width = size;
        canvas.height = size;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,
            (img.width-size)/2,
            (img.height-size)/2,
            size,size,
            0,0,size,size
        );

        updateImage(canvas);
    }

    img.src = URL.createObjectURL(imageFile);
}

/* COMPRESS */
function compressImage(){
    if(!imageFile) return alert("ارفع صورة");

    const reader = new FileReader();
    reader.onload = function(e){
        const img = new Image();
        img.onload = function(){
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img,0,0);

            canvas.toBlob(function(blob){
                imageFile = blob;
                updatePreview(URL.createObjectURL(blob));
            }, "image/jpeg", 0.5);
        }
        img.src = e.target.result;
    }
    reader.readAsDataURL(imageFile);
}

/* CONVERT PNG */
function convertImage(){
    if(!imageFile) return alert("ارفع صورة");

    const reader = new FileReader();
    reader.onload = function(e){
        const img = new Image();
        img.onload = function(){
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img,0,0);

            canvas.toBlob(function(blob){
                imageFile = blob;
                updatePreview(URL.createObjectURL(blob));
            }, "image/png");
        }
        img.src = e.target.result;
    }
    reader.readAsDataURL(imageFile);
}

/* UPDATE */
function updateImage(canvas){
    canvas.toBlob(function(blob){
        imageFile = blob;
        updatePreview(URL.createObjectURL(blob));
    });
}

function updatePreview(src){
    document.getElementById("previewBox").innerHTML =
    <img class="result-img" src="${src}">;
}
</script>

</body>
</html>
