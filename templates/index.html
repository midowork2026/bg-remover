<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMOUZI - AI Background Remover</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at center, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            background-attachment: fixed;
            color: #fff;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* --- مطر النجوم الذهبية المائلة --- */
        @keyframes dotRain {
            0% { transform: translate(100px, -100px); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translate(-200px, 100vh); opacity: 0; }
        }

        .dot-rain-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .dot {
            position: absolute;
            width: 2px; height: 2px;
            background-color: gold;
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 5px gold;
            animation: dotRain linear infinite;
        }

        /* توليد النقط عشوائياً */
        .dot:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .dot:nth-child(2) { left: 25%; animation-duration: 12s; animation-delay: 2s; }
        .dot:nth-child(3) { left: 40%; animation-duration: 10s; animation-delay: 4s; }
        .dot:nth-child(4) { left: 55%; animation-duration: 14s; animation-delay: 1s; }
        .dot:nth-child(5) { left: 70%; animation-duration: 9s; animation-delay: 3s; }
        .dot:nth-child(6) { left: 85%; animation-duration: 11s; animation-delay: 5s; }
        .dot:nth-child(7) { left: 95%; animation-duration: 13s; animation-delay: 0.5s; }
        .dot:nth-child(8) { left: 15%; animation-duration: 10s; animation-delay: 6s; }
        /* تكرار للنقط لزيادة الكثافة */
        .dot:nth-child(n+9) { width: 1.5px; height: 1.5px; opacity: 0.4; }

        /* البرواز الذهبي الخارجي */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid rgba(255, 215, 0, 0.4); 
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.3);
            pointer-events: none;
            z-index: 9999;
        }

        /* الهيدر */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .left-nav { display: flex; gap: 12px; justify-content: flex-start; }

        .nav-icon {
            width: 36px; height: 36px;
            border: 1px solid gold; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: gold; text-decoration: none; font-size: 14px;
            background: rgba(255, 215, 0, 0.05); transition: 0.3s;
        }
        .nav-icon:hover { 
            background: gold; color: black; box-shadow: 0 0 15px gold; transform: translateY(-2px); 
        }

        /* اللوجو مع تأثير الـ Hover */
        .logo-section { display: flex; flex-direction: column; align-items: center; }
        .logo {
            font-size: clamp(45px, 12vw, 80px); 
            color: gold; font-weight: bold;
            text-shadow: 0 0 20px gold;
            margin: 0; transition: 0.4s ease;
            cursor: pointer;
        }
        .logo:hover {
            text-shadow: 0 0 40px gold, 0 0 60px gold;
            transform: scale(1.05);
        }

        @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .logo-line {
            width: 200px; height: 3px;
            background: linear-gradient(to right, transparent, gold, transparent);
            background-size: 200% 100%;
            animation: shine 3s linear infinite;
            box-shadow: 0 0 10px gold;
        }

        .auth-section { display: flex; justify-content: flex-end; }
        .user-circle {
            width: 42px; height: 42px; background: gold; color: black;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; box-shadow: 0 0 15px gold;
        }
        .login-btn {
            padding: 8px 20px; border-radius: 10px; border: 1px solid gold;
            color: gold; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .login-btn:hover { background: gold; color: black; box-shadow: 0 0 15px gold; }

        /* المحتوى */
        .wrapper {
            display: flex; flex-direction: column; align-items: center;
            gap: 30px; margin-top: 30px; padding: 0 20px;
        }
        @media (min-width: 1024px) { .wrapper { flex-direction: row; justify-content: center; } }

        .box {
            width: 100%; max-width: 300px; height: 450px;
            border-radius: 150px; border: 2px solid gold;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.02); transition: 0.4s;
        }
        .box:hover { box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); transform: translateY(-5px); }

        .tool-btn {
            width: 130px; padding: 10px; border-radius: 12px;
            border: 1px solid gold; color: gold; font-weight: bold;
            background: transparent; cursor: pointer; transition: 0.3s;
        }
        .tool-btn:hover { background: gold; color: black; transform: scale(1.1); box-shadow: 0 0 15px gold; }

        .remove-btn {
            margin: 40px auto; width: 90%; max-width: 400px;
            padding: 15px; border-radius: 12px; border: 2px solid gold;
            background: rgba(255, 215, 0, 0.1); color: gold;
            font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .remove-btn:hover { background: gold; color: black; box-shadow: 0 0 40px gold; }

        /* الفوتر (الرجوع للنسخة الأصلية) */
        .footer-container {
            margin-top: 60px; padding: 30px 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            display: flex; flex-direction: column; gap: 15px; align-items: center;
        }
        @media (min-width: 768px) {
            .footer-container { flex-direction: row; justify-content: space-between; padding: 30px 80px; }
        }
        .footer-link { color: #fff; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .footer-link:hover { color: gold; text-shadow: 0 0 5px gold; }
    </style>
</head>
<body>
    <div class="dot-rain-container">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="header">
        <div class="left-nav">
            <a href="/" class="nav-icon" title="Home">🏠</a>
            <div class="nav-icon" title="Dark Mode">🌙</div>
            <div class="nav-icon" title="Language">EN</div>
        </div>
        <div class="logo-section">
            <h1 class="logo">HAMOUZI</h1>
            <div class="logo-line"></div>
        </div>
        <div class="auth-section">
            {% if user_email %}
                <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                    <div class="user-circle" title="{{ user_email }}">{{ user_email[0] | upper }}</div>
                    <a href="/logout" style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 10px;">Logout</a>
                </div>
            {% else %}
                <a href="/login" class="login-btn">Login</a>
            {% endif %}
        </div>
    </div>

    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
        <div class="wrapper">
            <div class="box">
                <h3 style="color:gold;">Upload</h3>
                <input type="file" name="file" id="fileInput" hidden required>
                <label for="fileInput" class="tool-btn" style="padding: 10px 20px; display: inline-block;">Choose File</label>
                <div id="file-name" style="margin-top:10px; color:gold; font-size:11px;">No file chosen</div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button type="button" class="tool-btn">Crop</button>
                <button type="button" class="tool-btn">Compress</button>
                <button type="button" class="tool-btn">Convert</button>
            </div>

            <div class="box">
                {% if result_image %}
                    <img src="data:image/png;base64,{{ result_image }}" style="max-width:80%; border-radius:15px; box-shadow: 0 0 20px gold;">
                {% else %}
                    <p style="opacity:0.3; font-size:12px;">Preview Area</p>
                {% endif %}
            </div>
        </div>
        <button type="submit" class="remove-btn">🪄 Remove Background</button>
    </form>

    <div class="footer-container">
        <a href="/privacy" class="footer-link">Privacy Policy</a>
        <div style="color:rgba(255,255,255,0.4); font-size:11px;">© 2026 HAMOUZI</div>
        <a href="/contact" class="footer-link">Contact Us</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('file-name').innerText = fileInput.files[0].name; };
    </script>
</body>
</html>
