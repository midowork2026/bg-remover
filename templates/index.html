<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMOUZI - AI Background Remover</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at center, rgba(255, 215, 0, 0.1) 0%, transparent 80%);
            background-attachment: fixed;
            color: #fff;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 🏆 FULL PAGE GLOW FRAME - البرواز الذهبي المضيء للصفحة كلها */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 4px solid rgba(255, 215, 0, 0.4); 
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.3), 
                        0 0 30px rgba(255, 215, 0, 0.3);
            pointer-events: none;
            z-index: 9999;
        }

        /* 🔥 HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            flex-grow: 1;
        }

        .logo {
            font-size: 85px; 
            color: gold;
            font-weight: bold;
            text-shadow: 0 0 25px gold;
            line-height: 1;
            margin: 0;
        }

        .logo-line {
            width: 250px;
            height: 3px;
            background: linear-gradient(to right, transparent, gold, transparent);
            margin-top: -25px;
            position: relative;
            z-index: 5;
        }

        .login-btn {
            padding: 10px 25px;
            border-radius: 12px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            width: 140px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .login-btn:hover { background: gold; color: black; box-shadow: 0 0 15px gold; }

        /* WRAPPER */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 40px;
        }

        .box {
            width: 320px;
            height: 460px;
            border-radius: 180px;
            border: 2px solid rgba(255, 215, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4), 0 0 45px rgba(255, 215, 0, 0.1); 
            background: rgba(255, 255, 255, 0.02);
            transition: 0.3s;
        }

        .tools {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .tool-link {
            text-decoration: none;
        }

        .tool-btn {
            width: 160px;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            font-size: 14px;
        }
        .tool-btn:hover { 
            background: gold; 
            color: black; 
            box-shadow: 0 0 15px gold;
            transform: scale(1.05);
        }

        /* تمييز زرار الدمج بلون مختلف قليلاً */
        .tool-btn.merge {
            border-color: #00ffcc;
            color: #00ffcc;
        }
        .tool-btn.merge:hover {
            background: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
        }

        /* UI ELEMENTS */
        .upload-btn {
            margin-top: 15px;
            padding: 12px 25px;
            border-radius: 15px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            display: inline-block;
            transition: 0.3s;
        }
        .upload-btn:hover { background: rgba(255, 215, 0, 0.1); }

        #file-name { margin-top: 10px; font-size: 13px; color: #ccc; max-width: 250px; overflow: hidden; }
        .loading-container { display: none; margin-top: 15px; color: gold; font-weight: bold; }
        .dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        
        .result-img { width: 85%; height: auto; border-radius: 20px; }

        .remove-btn {
            margin-top: 30px;
            padding: 15px 60px;
            border-radius: 20px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: 0.3s;
            font-weight: bold;
        }
        .remove-btn:hover { background: gold; color: black; box-shadow: 0 0 40px gold; }

        .footer { margin-top: 50px; padding-bottom: 40px; color: gold; }
        .footer a { color: gold; margin: 0 15px; text-decoration: none; opacity: 0.7; transition: 0.3s; }
        .footer a:hover { opacity: 1; text-decoration: underline; }

        .ad-space {
            width: 120px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 215, 0, 0.2);
            font-size: 12px;
            writing-mode: vertical-rl;
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="width: 140px;"></div>
        <div class="logo-container">
            <h1 class="logo">HAMOUZI</h1>
            <div class="logo-line"></div>
        </div>
        <a href="/login" class="login-btn">تسجيل الدخول</a>
    </div>

    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
        <div class="wrapper">
            <div class="ad-space">ADVERTISING SPACE</div>

            <div class="box">
                <h3 style="color:gold;">Upload Image</h3>
                <input type="file" name="file" id="fileInput" hidden required>
                <label for="fileInput" class="upload-btn" id="label-text">Choose Image</label>
                <div id="file-name">No file chosen</div>
                <div class="loading-container" id="loader">جارى المعالجة<span class="dots"></span></div>
            </div>

            <div class="tools">
                <a href="/crop" class="tool-link"><button type="button" class="tool-btn">Crop Image</button></a>
                <a href="/compress" class="tool-link"><button type="button" class="tool-btn">Compress Image</button></a>
                <a href="/convert" class="tool-link"><button type="button" class="tool-btn">Convert Format</button></a>
                <a href="/merge" class="tool-link"><button type="button" class="tool-btn merge">Merge Images</button></a>
            </div>

            <div class="box">
                {% if result_image %}
                    <img class="result-img" src="data:image/png;base64,{{ result_image }}">
                {% else %}
                    <h3 style="color:gold;">Preview</h3>
                    <p style="font-size: 14px; opacity: 0.5;">Your result will appear here</p>
                {% endif %}
            </div>

            <div class="ad-space">ADVERTISING SPACE</div>
        </div>

        <button type="submit" class="remove-btn">Remove Background</button>
    </form>

    <div class="footer">
        <a href="/privacy">Privacy Policy</a> | 
        <a href="/contact">Contact Us</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('file-name');
        const uploadForm = document.getElementById('uploadForm');
        const loader = document.getElementById('loader');
        const labelText = document.getElementById('label-text');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                fileNameDisplay.textContent = this.files[0].name;
            }
        });

        uploadForm.addEventListener('submit', function() {
            // إخفاء زر الاختيار وإظهار أنيميشن التحميل عند الضغط على الزر الرئيسي
            labelText.style.display = 'none';
            fileNameDisplay.style.display = 'none';
            loader.style.display = 'block';
        });
    </script>
</body>
</html>
