<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HAMOUZI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
    text-align:center;
}

/* LOGO */
.logo{
    font-size:55px;
    color:gold;
    margin-top:20px;
    text-shadow:0 0 20px gold;
}

/* WRAPPER */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin-top:40px;
}

/* BOX SHAPE */
.box{
    width:320px;
    height:460px;
    border-radius:180px;
    border:2px solid rgba(255,215,0,0.6);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
    box-shadow:0 0 20px rgba(255,215,0,0.4);
}

/* UPLOAD DASH BORDER */
.upload-box{
    border-style:dashed;
}

/* AD (خفيف جدًا) */
.ad{
    width:120px;
    height:420px;
    border-radius:20px;
    border:1px solid rgba(255,215,0,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    color:gold;
}

/* TOOLS */
.tools{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.tool-btn{
    width:150px;
    padding:12px;
    border-radius:15px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    cursor:pointer;
    box-shadow:0 0 10px rgba(255,215,0,0.4);
}

.tool-btn:hover{
    background:gold;
    color:black;
}

/* UPLOAD BUTTON */
.upload-btn{
    margin-top:15px;
    padding:12px 25px;
    border-radius:15px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    cursor:pointer;
}

/* PREVIEW BG (checker) */
.preview{
    background:
    linear-gradient(45deg,#444 25%, transparent 25%),
    linear-gradient(-45deg,#444 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #444 75%),
    linear-gradient(-45deg, transparent 75%, #444 75%);
    background-size:20px 20px;
    background-position:0 0, 0 10px, 10px -10px, -10px 0px;
}

/* IMAGE */
.result-img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:180px;
}

/* REMOVE BUTTON */
.remove-btn{
    margin-top:30px;
    padding:15px 60px;
    border-radius:20px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 15px gold;
}

.remove-btn:hover{
    background:gold;
    color:black;
}

/* FOOTER */
.footer{
    margin-top:25px;
    color:gold;
}
.footer a{
    color:gold;
    margin:0 10px;
}
</style>
</head>

<body>

<div class="logo">HAMOUZI</div>

<form action="/upload" method="POST" enctype="multipart/form-data">

<div class="wrapper">

<div class="ad">AD SPACE</div>

<!-- UPLOAD -->
<div class="box upload-box">
    <h3>Upload Image</h3>
    <p>Click to upload</p>

    <input type="file" name="file" id="fileInput" hidden>

    <label for="fileInput" class="upload-btn">
        Upload
    </label>
</div>

<!-- TOOLS -->
<div class="tools">
    <button type="button" class="tool-btn">Crop</button>
    <button type="button" class="tool-btn">Compress</button>
    <button type="button" class="tool-btn">Convert</button>
</div>

<!-- PREVIEW -->
<div class="box preview">

{% if result_image %}
<img class="result-img" src="data:image/png;base64,{{ result_image }}">
{% else %}
<h3>Preview</h3>
<p>Your image will appear here</p>
{% endif %}

</div>

<div class="ad">AD SPACE</div>

</div>

<button class="remove-btn">Remove Background</button>

</form>

<div class="footer">
    <a href="/privacy">Privacy Policy</a> |
    <a href="/contact">Contact Us</a>
</div>

</body>
</html>
