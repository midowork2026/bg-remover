<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMOUZI - AI Background Remover</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at center, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            background-attachment: fixed;
            color: #fff;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* --- تأثير مطر الشهب الغزير (Meteors Shower) --- */
        @keyframes meteor {
            0% { 
                transform: rotate(-40deg) translateX(0) translateY(0); 
                opacity: 0; 
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: rotate(-40deg) translateX(-1500px) translateY(1200px); 
                opacity: 0; 
            }
        }

        .meteor-shower {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .meteor {
            position: absolute;
            width: 1px; /* رفيعة جداً زي المطر */
            height: 80px; /* أقصر شوية عشان تبان أسرع */
            background: linear-gradient(to bottom, gold, transparent);
            opacity: 0;
        }

        /* توليد 20 شهاب بمسارات وتوقيتات عشوائية */
        .meteor:nth-child(1)  { top: -10%; left: 10%;  animation: meteor 4s linear infinite; animation-delay: 0s; }
        .meteor:nth-child(2)  { top: -10%; left: 20%;  animation: meteor 6s linear infinite; animation-delay: 1s; }
        .meteor:nth-child(3)  { top: -10%; left: 30%;  animation: meteor 5s linear infinite; animation-delay: 2s; }
        .meteor:nth-child(4)  { top: -10%; left: 40%;  animation: meteor 7s linear infinite; animation-delay: 0.5s; }
        .meteor:nth-child(5)  { top: -10%; left: 50%;  animation: meteor 4s linear infinite; animation-delay: 3s; }
        .meteor:nth-child(6)  { top: -10%; left: 60%;  animation: meteor 6s linear infinite; animation-delay: 1.5s; }
        .meteor:nth-child(7)  { top: -10%; left: 70%;  animation: meteor 5s linear infinite; animation-delay: 2.5s; }
        .meteor:nth-child(8)  { top: -10%; left: 80%;  animation: meteor 7s linear infinite; animation-delay: 4s; }
        .meteor:nth-child(9)  { top: -10%; left: 90%;  animation: meteor 4s linear infinite; animation-delay: 0.2s; }
        .meteor:nth-child(10) { top: -10%; left: 95%;  animation: meteor 6s linear infinite; animation-delay: 3.5s; }
        .meteor:nth-child(11) { top: 0%;   left: 15%;  animation: meteor 5s linear infinite; animation-delay: 5s; }
        .meteor:nth-child(12) { top: 10%;  left: 25%;  animation: meteor 7s linear infinite; animation-delay: 1s; }
        .meteor:nth-child(13) { top: 20%;  left: 35%;  animation: meteor 4s linear infinite; animation-delay: 2.2s; }
        .meteor:nth-child(14) { top: 30%;  left: 45%;  animation: meteor 6s linear infinite; animation-delay: 0.8s; }
        .meteor:nth-child(15) { top: 40%;  left: 55%;  animation: meteor 5s linear infinite; animation-delay: 3.1s; }
        .meteor:nth-child(16) { top: 50%;  left: 65%;  animation: meteor 7s linear infinite; animation-delay: 1.9s; }
        .meteor:nth-child(17) { top: 60%;  left: 75%;  animation: meteor 4s linear infinite; animation-delay: 4.5s; }
        .meteor:nth-child(18) { top: 70%;  left: 85%;  animation: meteor 6s linear infinite; animation-delay: 0s; }
        .meteor:nth-child(19) { top: 80%;  left: 92%;  animation: meteor 5s linear infinite; animation-delay: 2.7s; }
        .meteor:nth-child(20) { top: 90%;  left: 100%; animation: meteor 7s linear infinite; animation-delay: 5.5s; }

        /* البرواز الذهبي */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid rgba(255, 215, 0, 0.4); 
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.3);
            pointer-events: none;
            z-index: 9999;
        }

        /* الهيدر الموزون */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .left-nav {
            display: flex;
            gap: 15px;
            justify-content: flex-start;
        }

        .nav-icon {
            width: 38px;
            height: 38px;
            border: 1px solid gold;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: gold;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            background: rgba(255, 215, 0, 0.05);
            cursor: pointer;
        }
        .nav-icon:hover { 
            background: gold; 
            color: black; 
            box-shadow: 0 0 20px gold; 
            transform: translateY(-3px); 
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-size: clamp(45px, 15vw, 85px); 
            color: gold;
            font-weight: bold;
            text-shadow: 0 0 25px gold;
            margin: 0;
        }

        @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .logo-line {
            width: clamp(150px, 50vw, 280px);
            height: 4px;
            background: linear-gradient(to right, transparent 0%, gold 50%, transparent 100%);
            background-size: 200% 100%;
            margin-top: 5px;
            box-shadow: 0 0 15px gold;
            animation: shine 3s linear infinite;
        }

        .auth-section {
            display: flex;
            justify-content: flex-end;
        }

        .user-circle {
            width: 45px; height: 45px;
            background: gold; color: black;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-weight: bold; box-shadow: 0 0 20px gold;
        }

        .login-btn {
            padding: 10px 25px; border-radius: 12px;
            border: 1px solid gold; background: transparent;
            color: gold; text-decoration: none; font-weight: bold;
            transition: 0.3s;
        }
        .login-btn:hover { background: gold; color: black; box-shadow: 0 0 20px gold; }

        /* المحتوى الرئيسي */
        .wrapper {
            display: flex; flex-direction: column;
            align-items: center; gap: 30px;
            margin-top: 40px; padding: 0 20px;
        }
        @media (min-width: 1024px) { .wrapper { flex-direction: row; justify-content: center; } }

        .ad-space {
            display: none;
        }
        @media (min-width: 1200px) {
            .ad-space {
                display: flex; width: 120px; height: 500px;
                border: 1px solid rgba(255, 215, 0, 0.1);
                border-radius: 20px; align-items: center; justify-content: center;
                color: rgba(255, 215, 0, 0.4); font-size: 11px; writing-mode: vertical-rl;
                background: rgba(255, 215, 0, 0.03);
            }
        }

        .box {
            width: 100%; max-width: 320px; height: 480px;
            border-radius: 160px; border: 2px solid gold;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.1);
            transition: 0.4s;
        }
        .box:hover { box-shadow: 0 0 40px rgba(255, 215, 0, 0.4); border-color: #fff; transform: translateY(-5px); }

        .tools-container {
            display: flex; flex-direction: column; gap: 15px;
        }

        .tool-btn {
            width: 140px; padding: 12px; border-radius: 15px;
            border: 1px solid gold; background: transparent;
            color: gold; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .tool-btn:hover { background: gold; color: #000; box-shadow: 0 0 20px gold; transform: scale(1.1); }

        .remove-btn {
            margin: 50px auto; width: 90%; max-width: 450px;
            padding: 18px; border-radius: 15px; border: 2px solid gold;
            background: rgba(255, 215, 0, 0.1); color: gold;
            font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .remove-btn:hover { background: gold; color: #000; box-shadow: 0 0 50px gold; }

        .footer-container {
            margin-top: 80px; padding: 40px 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        @media (min-width: 768px) { .footer-container { flex-direction: row; justify-content: space-between; padding: 40px 80px; } }
        .footer-link { color: #fff; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .footer-link:hover { color: gold; }
    </style>
</head>
<body>
    <div class="meteor-shower">
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
        <div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div><div class="meteor"></div>
    </div>

    <div class="header">
        <div class="left-nav">
            <a href="/" class="nav-icon" title="Home">🏠</a>
            <div class="nav-icon" title="Toggle Dark Mode">🌙</div>
            <a href="#" class="nav-icon" title="Language">EN</a>
        </div>

        <div class="logo-section">
            <h1 class="logo">HAMOUZI</h1>
            <div class="logo-line"></div>
        </div>

        <div class="auth-section">
            {% if user_email %}
                <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                    <div class="user-circle" title="{{ user_email }}" style="cursor: pointer;">
                        {{ user_email[0] | upper }}
                    </div>
                    <a href="/logout" style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 11px;">Logout</a>
                </div>
            {% else %}
                <a href="/login" class="login-btn">Login</a>
            {% endif %}
        </div>
    </div>

    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
        <div class="wrapper">
            <div class="ad-space" style="flex-direction: column;">
                <img src="https://img.icons8.com/isometric-folders/100/null/brain.png" style="width: 45px; opacity:0.5; margin-bottom: 15px;">
                AI PROCESSOR
            </div>

            <div class="box">
                <h3 style="color:gold;">Upload Image</h3>
                <input type="file" name="file" id="fileInput" hidden required>
                <label for="fileInput" id="label-text" class="tool-btn" style="padding: 12px 30px; display: inline-block;">Choose File</label>
                <div id="file-name" style="margin-top:15px; color:gold; font-size:12px;">No file chosen</div>
                <div id="loader" style="display:none; color:gold; font-weight:bold; margin-top:15px;">Processing...</div>
            </div>

            <div class="tools-container">
                <a href="/crop"><button type="button" class="tool-btn">Crop</button></a>
                <a href="/compress"><button type="button" class="tool-btn">Compress</button></a>
                <a href="/convert"><button type="button" class="tool-btn">Convert</button></a>
                <a href="/merge"><button type="button" class="tool-btn">Merge</button></a>
            </div>

            <div class="box">
                {% if result_image %}
                    <img src="data:image/png;base64,{{ result_image }}" style="max-width:85%; border-radius:20px; box-shadow: 0 0 30px gold;">
                {% else %}
                    <h3 style="color:gold; opacity:0.3;">Preview</h3>
                    <p style="font-size:12px; opacity:0.2;">Result here</p>
                {% endif %}
            </div>

            <div class="ad-space" style="flex-direction: column;">
                <img src="https://img.icons8.com/isometric-folders/100/null/robot.png" style="width: 45px; opacity:0.5; margin-bottom: 15px;">
                SMART REMOVAL
            </div>
        </div>

        <button type="submit" class="remove-btn">🪄 Remove Background</button>
    </form>

    <div class="footer-container">
        <a href="/privacy" class="footer-link">Privacy Policy</a>
        <div style="color:rgba(255,255,255,0.4); font-size:12px;">© 2026 HAMOUZI</div>
        <a href="/contact" class="footer-link">Contact Us</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('file-name');
        fileInput.onchange = () => { if(fileInput.files[0]) fileName.innerText = "Selected: " + fileInput.files[0].name; };
        document.getElementById('uploadForm').onsubmit = () => {
            document.getElementById('loader').style.display = 'block';
        };
    </script>
</body>
</html>
