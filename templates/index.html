<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HAMOUZI</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle,#222,#000);
    color:#fff;
    text-align:center;
}

/* LOGO */
.logo{
    font-size:40px;
    color:gold;
    margin-top:20px;
}

/* LOGIN */
.login-btn{
    position:absolute;
    top:20px;
    right:20px;
    border:1px solid gold;
    padding:8px 15px;
    border-radius:10px;
    color:gold;
    text-decoration:none;
}

/* WRAPPER */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin-top:50px;
}

/* BOX */
.box{
    width:260px;
    height:380px;
    border:2px solid gold;
    border-radius:130px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* IMPORTANT FIX */
.box::before{
    pointer-events:none;
}

/* AD */
.ad{
    width:120px;
    height:350px;
    border:1px solid rgba(255,215,0,0.2);
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:gold;
}

/* BUTTON */
.upload-btn{
    margin-top:15px;
    padding:10px 20px;
    border:1px solid gold;
    border-radius:10px;
    cursor:pointer;
}

/* REMOVE BTN */
.remove-btn{
    margin-top:30px;
    padding:15px 40px;
    border-radius:15px;
    border:1px solid gold;
    background:black;
    color:gold;
    cursor:pointer;
}

/* IMAGE */
.result-img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:130px;
}

/* DOWNLOAD */
.download-btn{
    margin-top:10px;
    padding:10px 20px;
    border:1px solid gold;
    border-radius:10px;
    color:gold;
    text-decoration:none;
}

/* FOOTER */
.footer{
    margin-top:30px;
}
.footer a{
    color:gold;
    margin:0 10px;
}
</style>
</head>

<body>

<div class="logo">HAMOUZI</div>

<a href="/login" class="login-btn">تسجيل الدخول</a>

<form action="/upload" method="POST" enctype="multipart/form-data">

<div class="wrapper">

<div class="ad">AD</div>

<!-- UPLOAD -->
<div class="box">
    <h3>Upload</h3>

    <input type="file" name="file" id="fileInput" hidden required>

    <label for="fileInput" class="upload-btn">
        اضغط لرفع الصورة
    </label>

    <span id="fileName"></span>
</div>

<!-- PREVIEW -->
<div class="box">

{% if result_image %}
    <img class="result-img" src="data:image/png;base64,{{ result_image }}">
    
    <a download="result.png"
       href="data:image/png;base64,{{ result_image }}"
       class="download-btn">
       Download
    </a>
{% else %}
    <h3>Preview</h3>
{% endif %}

</div>

<div class="ad">AD</div>

</div>

<button class="remove-btn">Remove Background</button>

</form>

<div class="footer">
    <a href="/privacy">سياسة الخصوصية</a>
    |
    <a href="/contact">اتصل بنا</a>
</div>

</body>
</html>
