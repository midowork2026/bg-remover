<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HAMOUZI</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI';
    background: url("/static/bg.jpg") center/cover fixed;
    color: white;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: -1;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.logo {
    font-size: 40px;
    font-weight: bold;
    color: gold;
}

.login-btn {
    border: 1px solid gold;
    padding: 10px 20px;
    background: transparent;
    color: gold;
    cursor: pointer;
}

/* MAIN */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
}

/* ADS */
.ad {
    width: 150px;
    height: 420px;
    border-radius: 25px;
    border: 1px solid rgba(255,215,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    color: gold;
    backdrop-filter: blur(10px);
}

/* BOX */
.box {
    width: 280px;
    height: 420px;
    border-radius: 150px;
    border: 2px solid rgba(255,215,0,0.8);
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 30px rgba(255,215,0,0.4);
    position: relative;
}

/* INNER LINE */
.box::before {
    content: "";
    position: absolute;
    width: 230px;
    height: 360px;
    border-radius: 120px;
    border: 1px dashed rgba(255,215,0,0.4);
}

/* UPLOAD */
.upload-btn {
    margin-top: 15px;
    padding: 10px 20px;
    border: 1px solid gold;
    border-radius: 10px;
    background: transparent;
    color: gold;
    cursor: pointer;
}

.upload-btn:hover {
    background: gold;
    color: black;
}

/* IMAGE */
.result-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 20px;
}

/* MAIN BUTTON */
.main-btn {
    display: block;
    margin: 30px auto;
    padding: 15px 50px;
    border-radius: 20px;
    border: 1px solid gold;
    background: rgba(0,0,0,0.7);
    color: gold;
    font-size: 18px;
    cursor: pointer;
}

.main-btn:hover {
    background: gold;
    color: black;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 20px;
}

.footer a {
    color: gold;
    margin: 0 10px;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">HAMOUZI</div>
    <a href="/login"><button class="login-btn">تسجيل الدخول</button></a>
</div>

<form action="/upload" method="POST" enctype="multipart/form-data">

<div class="wrapper">

    <div class="ad">AD SPACE</div>

    <!-- UPLOAD -->
    <div class="box">
        <h3>Upload Image</h3>

        <input type="file" name="file" id="fileInput" hidden required>

        <button type="button" class="upload-btn"
        onclick="document.getElementById('fileInput').click()">
            اضغط لرفع الصورة
        </button>

        <span id="fileName"></span>
    </div>

    <!-- PREVIEW -->
    <div class="box">

        {% if result_image %}
            <img class="result-img" src="data:image/png;base64,{{ result_image }}">
            <br>

            <a download="result.png" href="data:image/png;base64,{{ result_image }}">
                <button class="upload-btn">Download</button>
            </a>

        {% else %}
            <p>Preview</p>
        {% endif %}

    </div>

    <div class="ad">AD SPACE</div>

</div>

<button class="main-btn">✨ Remove Background</button>

</form>

<div class="footer">
    <a href="/privacy">سياسة الخصوصية</a> |
    <a href="/contact">اتصل بنا</a>
</div>

<script>
document.getElementById("fileInput").addEventListener("change", function(){
    if(this.files.length > 0){
        document.getElementById("fileName").innerText = this.files[0].name;
    }
});
</script>

</body>
</html>
