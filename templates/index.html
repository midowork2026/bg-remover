<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMOUZI - AI Background Remover</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #000; color: #fff; text-align: center; min-height: 100vh; position: relative; overflow-x: hidden; }
        body::after { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; border: 4px solid rgba(255, 215, 0, 0.4); box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.3); pointer-events: none; z-index: 9999; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
        .logo { font-size: 80px; color: gold; font-weight: bold; text-shadow: 0 0 25px gold; margin: 0; }
        .login-btn { padding: 10px 25px; border-radius: 12px; border: 1px solid gold; background: transparent; color: gold; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .login-btn:hover { background: gold; color: black; }
        .wrapper { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 40px; flex-wrap: wrap; }
        .box { width: 300px; height: 450px; border-radius: 150px; border: 2px solid gold; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255, 215, 0, 0.02); box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .tool-btn { width: 160px; padding: 12px; border-radius: 15px; border: 1px solid gold; background: transparent; color: gold; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .tool-btn:hover { background: gold; color: black; box-shadow: 0 0 15px gold; }
        .remove-btn { margin-top: 40px; padding: 15px 60px; border-radius: 15px; border: 2px solid gold; background: rgba(255, 215, 0, 0.05); color: gold; font-size: 20px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 12px; margin-left: auto; margin-right: auto; transition: 0.3s; }
        .remove-btn:hover { background: gold; color: black; box-shadow: 0 0 40px gold; }
        .loading-container { display: none; color: gold; font-weight: bold; margin-top: 15px; }
        .dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        .footer-container { margin-top: 60px; padding: 30px 60px; border-top: 1px solid rgba(255, 215, 0, 0.2); display: flex; justify-content: space-between; align-items: center; }
        .footer-link { color: #fff; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .footer-link:hover { color: gold; }
        .upload-btn { padding: 12px 25px; border: 1px solid gold; border-radius: 15px; cursor: pointer; color: gold; }
    </style>
</head>
<body>
    <div class="header">
        <div style="width:140px;"></div>
        <h1 class="logo">HAMOUZI</h1>
        <a href="/login" class="login-btn">تسجيل الدخول</a>
    </div>

    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
        <div class="wrapper">
            <div class="box">
                <h3 style="color:gold;">Upload</h3>
                <input type="file" name="file" id="fileInput" hidden required>
                <label for="fileInput" id="label-text" class="upload-btn">Choose Image</label>
                <div id="file-name" style="margin-top:10px; font-size:12px; color:gold;">No file chosen</div>
                <div class="loading-container" id="loader">جارى المعالجة<span class="dots"></span></div>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px;">
                <a href="/crop"><button type="button" class="tool-btn">Crop Image</button></a>
                <a href="/compress"><button type="button" class="tool-btn">Compress Image</button></a>
                <a href="/convert"><button type="button" class="tool-btn">Convert Format</button></a>
                <a href="/merge"><button type="button" class="tool-btn">Merge Images</button></a>
            </div>

            <div class="box">
                {% if result_image %}
                    <img src="data:image/png;base64,{{ result_image }}" style="max-width:85%; border-radius:15px;">
                {% else %}
                    <h3 style="color:gold; opacity:0.5;">Preview</h3>
                {% endif %}
            </div>
        </div>
        <button type="submit" class="remove-btn">🪄 Remove Background</button>
    </form>

    <div class="footer-container">
        <a href="/privacy" class="footer-link">🛡️ Privacy Policy</a>
        <div style="color:rgba(255,255,255,0.5);">© 2026 HAMOUZI. All rights reserved.</div>
        <a href="/contact" class="footer-link">📞 Contact Us</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('file-name');
        const form = document.getElementById('uploadForm');
        const loader = document.getElementById('loader');
        const label = document.getElementById('label-text');

        fileInput.onchange = () => { if(fileInput.files[0]) fileName.innerText = fileInput.files[0].name; };
        form.onsubmit = () => { label.style.display='none'; fileName.style.display='none'; loader.style.display='block'; };
    </script>
</body>
</
