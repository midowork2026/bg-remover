<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HAMOUZI</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.logo {
    font-size: 40px;
    color: gold;
}

.login-btn {
    border: 1px solid gold;
    background: transparent;
    color: gold;
    padding: 10px 20px;
    cursor: pointer;
}

/* MAIN */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
}

/* BOX */
.box {
    width: 250px;
    height: 350px;
    border: 2px solid gold;
    border-radius: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* ADS */
.ad {
    width: 120px;
    height: 350px;
    border: 1px solid gold;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* UPLOAD BUTTON */
.upload-btn {
    margin-top: 15px;
    padding: 10px 20px;
    border: 1px solid gold;
    background: transparent;
    color: gold;
    cursor: pointer;
}

/* MAIN BUTTON */
.main-btn {
    margin-top: 30px;
    padding: 15px 40px;
    border: 1px solid gold;
    background: transparent;
    color: gold;
    cursor: pointer;
}

/* IMAGE */
.result-img {
    width: 200px;
    margin-top: 10px;
}

/* FOOTER */
.footer {
    margin-top: 40px;
}

.footer a {
    color: gold;
    margin: 10px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">HAMOUZI</div>
    <a href="/login"><button class="login-btn">تسجيل الدخول</button></a>
</div>

<form action="/upload" method="POST" enctype="multipart/form-data">

<div class="wrapper">

    <div class="ad">AD</div>

    <!-- UPLOAD -->
    <div class="box">
        <h3>Upload Image</h3>

        <input type="file" name="file" id="fileInput" hidden required>

        <button type="button" class="upload-btn" onclick="document.getElementById('fileInput').click()">
            اضغط لرفع الصورة
        </button>

        <span id="fileName"></span>
    </div>

    <!-- PREVIEW -->
    <div class="box">
        <h3>Preview</h3>

        {% if result_image %}
            <img class="result-img" src="data:image/png;base64,{{ result_image }}">
            <br>
            <a download="result.png" href="data:image/png;base64,{{ result_image }}">
                <button class="upload-btn">Download</button>
            </a>
        {% else %}
            <p>الصورة هتظهر هنا</p>
        {% endif %}
    </div>

    <div class="ad">AD</div>

</div>

<button class="main-btn">Remove Background</button>

</form>

<!-- FOOTER -->
<div class="footer">
    <a href="/privacy">سياسة الخصوصية</a>
    |
    <a href="/contact">اتصل بنا</a>
</div>

<script>
document.getElementById("fileInput").addEventListener("change", function(){
    if(this.files.length > 0){
        document.getElementById("fileName").innerText = this.files[0].name;
    }
});
</script>

</body>
</html>
