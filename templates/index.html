<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>HAMOUZI - Remove Background</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url("{{ url_for('static', filename='bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: -1;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            align-items: center;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: gold;
        }

        .login-btn {
            padding: 10px 25px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: gold;
            color: black;
        }

        .container {
            text-align: center;
            margin-top: 40px;
        }

        .title {
            font-size: 50px;
            color: gold;
            margin-bottom: 30px;
        }

        .main-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .box {
            width: 250px;
            height: 350px;
            border: 2px solid gold;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px gold;
        }

        input[type="file"] {
            margin-top: 10px;
            color: white;
        }

        .btn {
            margin-top: 20px;
            padding: 15px 30px;
            background: black;
            border: 1px solid gold;
            color: gold;
            font-size: 18px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: gold;
            color: black;
        }

        footer {
            margin-top: 60px;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #333;
        }

        footer p {
            margin-bottom: 10px;
        }

        footer a {
            color: gold;
            margin: 0 15px;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">HAMOUZI</div>
    <a href="/login"><button class="login-btn">تسجيل الدخول</button></a>
</header>

<div class="container">
    <div class="title">Remove Background</div>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <div class="main-box">

            <div class="box">
                <p>Upload Image</p>
                <input type="file" name="file" required>
            </div>

            <div>
                <button type="submit" class="btn">Remove Background</button>
            </div>

            <div class="box">
                <p>Preview</p>

                {% if result_image %}
                    <img src="data:image/png;base64,{{ result_image }}">
                    <br><br>
                    <a download="result.png" href="data:image/png;base64,{{ result_image }}">
                        <button class="btn">Download</button>
                    </a>
                {% endif %}

            </div>

        </div>
    </form>
</div>

<footer>
    <p>© 2026 HAMOUZI - All Rights Reserved</p>
    <a href="/privacy">سياسة الخصوصية</a>
    |
    <a href="/contact">اتصل بنا</a>
</footer>

</body>
</html>
