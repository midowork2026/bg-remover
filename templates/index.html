<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMOUZI - AI Background Remover</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at center, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            background-attachment: fixed;
            color: #fff;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid rgba(255, 215, 0, 0.4); 
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.3);
            pointer-events: none;
            z-index: 9999;
        }

        /* الهيدر: جعلناه مرن لتوزيع العناصر يمين وشمال */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: 50px; /* لتعويض مكان الزرار والمحافظة على التوسط */
        }

        .logo {
            font-size: clamp(35px, 10vw, 70px); 
            color: gold;
            font-weight: bold;
            text-shadow: 0 0 25px gold;
            margin: 0;
        }

        .logo-line {
            width: 150px;
            height: 3px;
            background: linear-gradient(to right, transparent, gold, transparent);
            margin-top: 5px;
        }

        /* تنسيق منطقة الحساب والزرار جهة اليمين */
        .auth-area {
            min-width: 100px;
            display: flex;
            justify-content: flex-end;
        }

        .user-icon {
            width: 40px;
            height: 40px;
            background: gold;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 15px gold;
            cursor: pointer;
        }

        .login-btn {
            padding: 8px 20px;
            border-radius: 10px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .login-btn:hover { background: gold; color: #000; }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        @media (min-width: 1024px) {
            .wrapper { flex-direction: row; justify-content: center; }
        }

        .box {
            width: 300px;
            height: 450px;
            border-radius: 150px;
            border: 2px solid gold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .tools-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        @media (min-width: 1024px) { .tools-container { display: flex; flex-direction: column; } }

        .tool-btn {
            width: 130px;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            font-weight: bold;
            cursor: pointer;
        }

        .remove-btn {
            margin: 30px auto;
            width: 90%;
            max-width: 400px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid gold;
            background: rgba(255, 215, 0, 0.1);
            color: gold;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
        }

        /* الفوتر: رجعناه يظهر بوضوح تحت */
        .footer-container {
            margin-top: auto;
            padding: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
        }
        
        .footer-link { color: #fff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="width: 100px;"></div> <div class="logo-container">
            <h1 class="logo">HAMOUZI</h1>
            <div class="logo-line"></div>
        </div>

        <div class="auth-area">
            {% if user_email %}
                <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                    <div class="user-icon" title="{{ user_email }}">{{ user_email[0] | upper }}</div>
                    <a href="/logout" style="color: gold; font-size: 10px; text-decoration: none;">Logout</a>
                </div>
            {% else %}
                <a href="/login" class="login-btn">Login</a>
            {% endif %}
        </div>
    </div>

    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
        <div class="wrapper">
            <div class="box">
                <h3 style="color:gold;">Upload</h3>
                <input type="file" name="file" id="fileInput" hidden required>
                <label for="fileInput" class="tool-btn" style="cursor: pointer; display: inline-block;">Select Image</label>
                <div id="file-name" style="margin-top: 10px; font-size: 11px;"></div>
                <div id="loader" style="display:none; color: gold; margin-top:10px;">Processing...</div>
            </div>

            <div class="tools-container">
                <button type="button" class="tool-btn">Crop</button>
                <button type="button" class="tool-btn">Compress</button>
                <button type="button" class="tool-btn">Convert</button>
                <button type="button" class="tool-btn">Merge</button>
            </div>

            <div class="box">
                {% if result_image %}
                    <img src="data:image/png;base64,{{ result_image }}" style="max-width:80%; border-radius:15px;">
                {% else %}
                    <p style="color: rgba(255,215,0,0.3);">Preview</p>
                {% endif %}
            </div>
        </div>

        <button type="submit" class="remove-btn">🪄 Remove Background</button>
    </form>

    <div class="footer-container">
        <a href="/privacy" class="footer-link">Privacy</a>
        <span>© 2026 HAMOUZI</span>
        <a href="/contact" class="footer-link">Contact</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('file-name');
        fileInput.onchange = () => { if(fileInput.files[0]) fileName.innerText = fileInput.files[0].name; };
        document.getElementById('uploadForm').onsubmit = () => { document.getElementById('loader').style.display = 'block'; };
    </script>
</body>
</html>
