<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HAMOUZI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("/static/bg.jpg") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* Overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: -1;
}

/* Logo */
.logo {
    text-align: center;
    font-size: 60px;
    color: gold;
    margin-top: 20px;
}

/* Layout */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 30px;
    gap: 30px;
}

/* Ads */
.ad {
    width: 150px;
    height: 400px;
    border: 1px solid gold;
    display: flex;
    justify-content: center;
    align-items: center;
    color: gold;
}

/* Oval Boxes */
.box {
    width: 260px;
    height: 380px;
    border: 2px solid gold;
    border-radius: 150px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Center buttons */
.tools {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.tools button {
    padding: 12px;
    width: 150px;
    background: black;
    border: 1px solid gold;
    color: gold;
    border-radius: 10px;
}

/* Main Button */
.main-btn {
    display: block;
    margin: 30px auto;
    padding: 15px 40px;
    background: black;
    border: 1px solid gold;
    color: gold;
    border-radius: 12px;
    font-size: 18px;
}

/* Footer */
footer {
    text-align: center;
    margin-top: 20px;
    color: #aaa;
}
footer a {
    color: gold;
    margin: 0 10px;
}
</style>
</head>

<body>

<div class="logo">HAMOUZI</div>

<form action="/upload" method="POST" enctype="multipart/form-data">

<div class="wrapper">

    <!-- Ad -->
    <div class="ad">AD SPACE</div>

    <!-- Upload -->
    <div class="box">
        <p>Upload Image</p>
        <input type="file" name="file" required>
    </div>

    <!-- Tools -->
    <div class="tools">
        <button>Crop</button>
        <button>Compress</button>
        <button>Convert</button>
    </div>

    <!-- Preview -->
    <div class="box">
        <p>Preview</p>

        {% if result_image %}
            <img src="data:image/png;base64,{{ result_image }}" width="150">
        {% endif %}
    </div>

    <!-- Ad -->
    <div class="ad">AD SPACE</div>

</div>

<button type="submit" class="main-btn">Remove Background</button>

</form>

<footer>
    <a href="/privacy">Privacy Policy</a> |
    <a href="/contact">Contact Us</a>
    <br><br>
    © 2025 HAMOUZI
</footer>

</body>
</html>
