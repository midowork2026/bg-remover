<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HAMOUZI</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color: #000;
    /* 🔥 BACKGROUND GLOW - التوهج اللي في نص الخلفية */
    background-image: radial-gradient(circle at center, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
    background-attachment: fixed;
    color:#fff;
    text-align:center;
    min-height: 100vh;
    position: relative;
}

/* 🏆 FULL PAGE GLOW FRAME - الفريم الذهبي المضيء للصفحة كلها */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border: 3px solid rgba(255, 215, 0, 0.4); 
    box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.3), 
                0 0 20px rgba(255, 215, 0, 0.3);
    pointer-events: none; /* عشان ميعطلش الضغط على الزراير */
    z-index: 9999;
}

/* 🔥 HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo-container {
    display: flex;
    flex-direction: column;
    align-items: center; 
    justify-content: center;
    flex-grow: 1;
}

.logo {
    font-size: 85px; 
    color: gold;
    font-weight: bold;
    text-shadow: 0 0 25px gold;
    line-height: 1;
    margin: 0;
}

.logo-line {
    width: 250px;
    height: 3px;
    background: linear-gradient(to right, transparent, gold, transparent);
    margin-top: -25px;
    position: relative;
    z-index: 5;
}

.login-btn{
    padding:10px 20px;
    border-radius:12px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    cursor:pointer;
    width: 120px;
}
.login-btn:hover { background: gold; color: black; }

/* WRAPPER */
.wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin-top:40px;
}

/* BOXES */
.box{
    width: 320px;
    height: 460px;
    border-radius: 180px;
    border: 2px solid rgba(255, 215, 0, 0.8);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.4), 0 0 45px rgba(255, 215, 0, 0.2); 
    overflow: hidden;
    background: rgba(255, 255, 255, 0.02);
}

.upload-box{ border-style: dashed; }

.ad{
    width:120px;
    height:420px;
    border-radius:20px;
    border:1px solid rgba(255,215,0,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    color:gold;
}

.tools{ display:flex; flex-direction:column; gap:15px; }

.tool-btn{
    width:150px;
    padding:12px;
    border-radius:15px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    cursor:pointer;
    transition: 0.3s;
}
.tool-btn:hover { background: gold; color: black; }

.upload-btn{
    margin-top:15px;
    padding:12px 25px;
    border-radius:15px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    cursor:pointer;
    display: inline-block;
}

/* FILE NAME & LOADER */
#file-name {
    margin-top: 10px;
    font-size: 13px;
    color: #ccc;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.loading-container {
    display: none;
    margin-top: 15px;
    color: gold;
    font-weight: bold;
}

.dots:after {
    content: '.';
    animation: dots 1.5s steps(5, end) infinite;
}

@keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60% { content: '...'; }
    80%, 100% { content: ''; }
}

.preview{ background: transparent; }
.result-img{ width:100%; height:100%; object-fit: contain; }

.remove-btn{
    margin-top:30px;
    padding:15px 60px;
    border-radius:20px;
    border:1px solid gold;
    background:transparent;
    color:gold;
    font-size:18px;
    cursor:pointer;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    transition: 0.3s;
}
.remove-btn:hover { background: gold; color: black; box-shadow: 0 0 40px gold; }

.footer{ margin-top:30px; padding-bottom: 25px; color:gold; }
.footer a{ color:gold; margin:0 10px; text-decoration: none; }
</style>
</head>

<body>

<div class="header">
    <div style="width: 120px;"></div>
    <div class="logo-container">
        <h1 class="logo">HAMOUZI</h1>
        <div class="logo-line"></div>
    </div>
    <button class="login-btn">تسجيل الدخول</button>
</div>
    
<form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">

<div class="wrapper">
    <div class="ad">AD SPACE</div>

    <div class="box upload-box">
        <h3>Upload Image</h3>
        <input type="file" name="file" id="fileInput" hidden required>
        
        <label for="fileInput" class="upload-btn" id="label-text">
            Choose Image
        </label>
        
        <div id="file-name">No file chosen</div>

        <div class="loading-container" id="loader">
            جارى المعالجة<span class="dots"></span>
        </div>
    </div>

    <div class="tools">
        <button type="button" class="tool-btn">Crop</button>
        <button type="button" class="tool-btn">Compress</button>
        <button type="button" class="tool-btn">Convert</button>
    </div>

    <div class="box preview">
        {% if result_image %}
            <img class="result-img" src="data:image/png;base64,{{ result_image }}">
        {% else %}
            <h3>Preview</h3>
            <p style="font-size: 14px; opacity: 0.7;">Your image will appear here</p>
        {% endif %}
    </div>

    <div class="ad">AD SPACE</div>
</div>

<button type="submit" class="remove-btn" id="submitBtn">Remove Background</button>

</form>

<div class="footer">
    <a href="/privacy">Privacy Policy</a> | <a href="/contact">Contact Us</a>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('file-name');
    const uploadForm = document.getElementById('uploadForm');
    const loader = document.getElementById('loader');
    const labelText = document.getElementById('label-text');

    // إظهار اسم الملف
    fileInput.addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
            fileNameDisplay.textContent = this.files[0].name;
        } else {
            fileNameDisplay.textContent = "No file chosen";
        }
    });

    // أنيميشن التحميل عند الرفع
    uploadForm.addEventListener('submit', function() {
        labelText.style.display = 'none';
        fileNameDisplay.style.display = 'none';
        loader.style.display = 'block';
    });
</script>

</body>
</html>
