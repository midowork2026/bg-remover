<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HAMOUZI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("/static/bg.jpg") center/cover fixed;
    color: white;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.7), #000);
    z-index: -1;
}

/* LOGO */
.logo {
    text-align: center;
    font-size: 70px;
    font-weight: bold;
    background: linear-gradient(to right, #FFD700, #ffcc00, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-top: 20px;
}

/* GOLD LINE */
.line {
    width: 250px;
    height: 2px;
    margin: 10px auto 30px;
    background: linear-gradient(to right, transparent, gold, transparent);
}

/* MAIN */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
}

/* ADS */
.ad {
    width: 150px;
    height: 420px;
    border-radius: 25px;
    border: 1px solid rgba(255,215,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    color: gold;
    backdrop-filter: blur(10px);
}

/* OVAL BOX */
.box {
    position: relative;
    width: 270px;
    height: 420px;
    border-radius: 150px;
    border: 2px solid rgba(255,215,0,0.7);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

/* INNER DASHED */
.box::before {
    content: "";
    position: absolute;
    width: 230px;
    height: 360px;
    border-radius: 130px;
    border: 1px dashed rgba(255,215,0,0.4);
}

/* ICON */
.icon {
    font-size: 50px;
    color: gold;
}

/* TEXT */
.box h3 {
    margin: 10px 0;
}

.box p {
    color: #bbb;
}

/* UPLOAD BUTTON */
.upload-area {
    margin-top: 15px;
    padding: 12px 20px;
    border: 1px solid gold;
    border-radius: 10px;
    cursor: pointer;
    color: gold;
    transition: 0.3s;
}

.upload-area:hover {
    background: gold;
    color: black;
    box-shadow: 0 0 15px gold;
}

/* TOOLS */
.tools {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.tools button {
    width: 160px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,215,0,0.6);
    background: rgba(0,0,0,0.6);
    color: gold;
    cursor: pointer;
    transition: 0.3s;
}

.tools button:hover {
    background: gold;
    color: black;
    box-shadow: 0 0 15px gold;
}

/* MAIN BUTTON */
.main-btn {
    display: block;
    margin: 30px auto;
    padding: 18px 50px;
    border-radius: 20px;
    border: 1px solid gold;
    background: rgba(0,0,0,0.7);
    color: gold;
    font-size: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.main-btn:hover {
    background: gold;
    color: black;
    box-shadow: 0 0 20px gold;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 30px;
}

.footer p {
    color: #aaa;
}

.footer a {
    color: gold;
    margin: 0 10px;
    text-decoration: none;
}

.footer a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="logo">HAMOUZI</div>
<div class="line"></div>

<form action="/upload" method="POST" enctype="multipart/form-data">

<div class="wrapper">

    <div class="ad">AD SPACE</div>

    <!-- UPLOAD -->
    <div class="box">
        <div class="icon">☁️</div>
        <h3>Upload Image</h3>
        <p>Click to upload</p>

        <label class="upload-area">
            <input type="file" name="file" required hidden id="fileInput">
            <span id="fileName">اضغط لرفع الصورة</span>
        </label>
    </div>

    <!-- TOOLS -->
    <div class="tools">
        <button type="button">✂️ Crop</button>
        <button type="button">📦 Compress</button>
        <button type="button">🔄 Convert</button>
    </div>

    <!-- PREVIEW -->
    <div class="box">
        <div class="icon">🧊</div>
        <h3>Preview</h3>

        {% if result_image %}
            <img src="data:image/png;base64,{{ result_image }}" width="180">
        {% else %}
            <p>Your image will appear here</p>
        {% endif %}
    </div>

    <div class="ad">AD SPACE</div>

</div>

<button class="main-btn">✨ Remove Background</button>

</form>

<div class="footer">
    <p>✔️ 100% Secure | 🔒 No data stored | ⭐ High Quality</p>

    <a href="/privacy">Privacy Policy</a> |
    <a href="/contact">Contact Us</a>

    <p>© 2025 HAMOUZI</p>
</div>

<!-- SCRIPT -->
<script>
document.getElementById("fileInput").addEventListener("change", function(){
    if(this.files.length > 0){
        document.getElementById("fileName").innerText = this.files[0].name;
    }
});
</script>

</body>
</html>
