
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMOUZI - AI Background Remover</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at center, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            background-attachment: fixed;
            color: #fff;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* --- البرواز الذهبي (لازم يكون ثابت وموجود) --- */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid rgba(255, 215, 0, 0.4); 
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.3);
            pointer-events: none;
            z-index: 9999;
        }

        /* --- مطر النجوم المائل لليسار --- */
        @keyframes dotRain {
            0% { transform: translate(100px, -100px); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translate(-200px, 100vh); opacity: 0; }
        }
        .dot-rain-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }
        .dot {
            position: absolute;
            width: 2px; height: 2px;
            background-color: gold;
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 5px gold;
            animation: dotRain linear infinite;
        }
        .dot:nth-child(1) { left: 10%; animation-duration: 8s; }
        .dot:nth-child(2) { left: 30%; animation-duration: 12s; animation-delay: 2s; }
        .dot:nth-child(3) { left: 50%; animation-duration: 10s; animation-delay: 4s; }
        .dot:nth-child(4) { left: 70%; animation-duration: 14s; animation-delay: 1s; }
        .dot:nth-child(5) { left: 90%; animation-duration: 9s; animation-delay: 3s; }

        /* --- الهيدر (ترتيب ثلاثي ثابت) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: relative;
            z-index: 10;
        }

        .left-nav { display: flex; gap: 15px; width: 200px; justify-content: flex-start; }
        .nav-icon {
            width: 38px; height: 38px;
            border: 1px solid gold; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: gold; text-decoration: none; font-size: 14px;
            background: rgba(255, 215, 0, 0.05); transition: 0.3s;
        }
        .nav-icon:hover { background: gold; color: black; box-shadow: 0 0 20px gold; transform: translateY(-3px); }

        .logo-section { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        .logo {
            font-size: clamp(45px, 15vw, 85px); 
            color: gold; font-weight: bold;
            text-shadow: 0 0 25px gold;
            margin: 0; cursor: pointer;
            transition: 0.4s ease-in-out;
        }
        .logo:hover { text-shadow: 0 0 50px gold, 0 0 80px gold; transform: scale(1.05); }

        @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .logo-line {
            width: 250px; height: 4px;
            background: linear-gradient(to right, transparent, gold, transparent);
            background-size: 200% 100%;
            animation: shine 3s linear infinite;
            box-shadow: 0 0 10px gold;
        }

        .auth-section { width: 200px; display: flex; justify-content: flex-end; }
        .login-btn {
            padding: 10px 25px; border-radius: 12px; border: 1px solid gold;
            color: gold; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .login-btn:hover { background: gold; color: black; box-shadow: 0 0 20px gold; }

        /* --- المحتوى (البوكسات) --- */
        .wrapper {
            display: flex; flex-direction: column; align-items: center;
            gap: 30px; margin-top: 40px; padding: 0 20px;
        }
        @media (min-width: 1024px) { .wrapper { flex-direction: row; justify-content: center; } }

        .box {
            width: 100%; max-width: 320px; height: 480px;
            border-radius: 160px; border: 2px solid gold;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.02); transition: 0.4s;
        }
        .box:hover { box-shadow: 0 0 40px rgba(255, 215, 0, 0.4); transform: translateY(-5px); }

        .tools-container { display: flex; flex-direction: column; gap: 15px; }
        .tool-btn {
            width: 140px; padding: 12px; border-radius: 15px;
            border: 1px solid gold; color: gold; font-weight: bold;
            background: transparent; cursor: pointer; transition: 0.3s;
        }
        .tool-btn:hover { background: gold; color: #000; box-shadow: 0 0 20px gold; transform: scale(1.1); }

        .remove-btn {
            margin: 50px auto; width: 90%; max-width: 450px;
            padding: 18px; border-radius: 15px; border: 2px solid gold;
            background: rgba(255, 215, 0, 0.1); color: gold; font-size: 22px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .remove-btn:hover { background: gold; color: #000; box-shadow: 0 0 50px gold; }

        /* --- الفوتر --- */
        .footer-container {
            margin-top: 80px; padding: 40px 80px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        @media (max-width: 768px) { .footer-container { flex-direction: column; gap: 20px; } }
        .footer-link { color: #fff; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .footer-link:hover { color: gold; }
    </style>
</head>
<body>
    <div class="dot-rain-container">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="header">
        <div class="left-nav">
            <a href="/" class="nav-icon" title="Home">🏠</a>
            <div class="nav-icon" title="Dark Mode">🌙</div>
            <div class="nav-icon" title="Language">EN</div>
        </div>
        <div class="logo-section">
            <h1 class="logo">HAMOUZI</h1>
            <div class="logo-line"></div>
        </div>
        <div class="auth-section">
            <a href="/login" class="login-btn">Login</a>
        </div>
    </div>

    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
        <div class="wrapper">
            <div class="box">
                <h3 style="color:gold;">Upload</h3>
                <input type="file" name="file" id="fileInput" hidden required>
                <label for="fileInput" class="tool-btn" style="padding: 12px 30px; display: inline-block;">Choose File</label>
            </div>
            <div class="tools-container">
                <button type="button" class="tool-btn">Crop</button>
                <button type="button" class="tool-btn">Compress</button>
                <button type="button" class="tool-btn">Convert</button>
            </div>
            <div class="box">
                <p style="opacity:0.3;">Preview</p>
            </div>
        </div>
        <button type="submit" class="remove-btn">🪄 Remove Background</button>
    </form>

    <div class="footer-container">
        <a href="/privacy" class="footer-link">Privacy Policy</a>
        <div style="color:rgba(255,255,255,0.4); font-size:12px;">© 2026 HAMOUZI</div>
        <a href="/contact" class="footer-link">Contact Us</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        fileInput.onchange = () => { if(fileInput.files[0]) console.log("File selected"); };
    </script>
</body>
</html>
