<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMOUZI - AI Background Remover</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            background-image: radial-gradient(circle at center, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            background-attachment: fixed;
            color: #fff;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* البرواز الذهبي المضيء */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid rgba(255, 215, 0, 0.4); 
            box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.3);
            pointer-events: none;
            z-index: 9999;
        }

        /* الهيدر المنظم */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 150px; /* مساحة ثابتة للهيدر عشان مياثرش على اللي تحته */
        }

        .logo {
            font-size: clamp(45px, 15vw, 85px); 
            color: gold;
            font-weight: bold;
            text-shadow: 0 0 25px gold;
            margin: 0;
            transition: 0.3s;
        }

        .logo-line {
            width: clamp(150px, 50vw, 280px);
            height: 3px;
            background: linear-gradient(to right, transparent, gold, transparent);
            margin-top: 5px;
            box-shadow: 0 0 10px gold;
        }

        /* منطقة أيقونة الحساب */
        .user-area {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .user-icon {
            width: 45px;
            height: 45px;
            background: gold;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 20px gold;
            font-size: 20px;
        }

        .logout-link {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 11px;
            transition: 0.3s;
        }
        .logout-link:hover { color: gold; }

        .login-btn {
            margin-top: 15px;
            padding: 8px 25px;
            border-radius: 12px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            text-decoration: none;
            transition: 0.3s;
        }
        .login-btn:hover { background: gold; color: #000; box-shadow: 0 0 15px gold; }

        /* منطقة المحتوى - الـ Wrapper */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-top: 10px;
            padding: 0 20px;
        }

        @media (min-width: 1024px) {
            .wrapper { flex-direction: row; justify-content: center; align-items: center; }
        }

        /* الصناديق البيضاوية (البيضاوية المثالية) */
        .box {
            width: 100%;
            max-width: 320px;
            height: 480px;
            border-radius: 160px; /* الحفاظ على الشكل البيضاوي */
            border: 2px solid gold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            transition: 0.4s;
        }
        .box:hover { box-shadow: 0 0 35px rgba(255, 215, 0, 0.4); border-color: #fff; }

        .tools-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        @media (min-width: 1024px) { .tools-container { display: flex; flex-direction: column; } }

        .tool-btn {
            width: 100%;
            min-width: 140px;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid gold;
            background: transparent;
            color: gold;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .tool-btn:hover { background: gold; color: #000; box-shadow: 0 0 20px gold; transform: translateY(-3px); }

        .remove-btn {
            margin: 40px auto;
            width: 90%;
            max-width: 450px;
            padding: 18px;
            border-radius: 15px;
            border: 2px solid gold;
            background: rgba(255, 215, 0, 0.1);
            color: gold;
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: 0.3s;
        }
        .remove-btn:hover { background: gold; color: #000; box-shadow: 0 0 40px gold; transform: scale(1.03); }

        .upload-btn {
            padding: 12px 30px;
            border: 1px solid gold;
            border-radius: 15px;
            cursor: pointer;
            color: gold;
            font-weight: bold;
            transition: 0.3s;
        }
        .upload-btn:hover { background: rgba(255, 215, 0, 0.2); }

        #file-name { margin-top: 15px; font-size: 13px; color: gold; padding: 0 10px; }

        .loading-container { display: none; color: gold; font-weight: bold; margin-top: 15px; }
        .dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }

        .ad-space { display: none; }
        @media (min-width: 1200px) {
            .ad-space {
                display: flex; width: 100px; height: 400px;
                border: 1px solid rgba(255, 215, 0, 0.1);
                border-radius: 20px; align-items: center; justify-content: center;
                color: rgba(255, 215, 0, 0.2); font-size: 12px; writing-mode: vertical-rl;
            }
        }

        .footer-container {
            margin-top: 60px; padding: 30px 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        @media (min-width: 768px) {
            .footer-container { flex-direction: row; justify-content: space-between; padding: 30px 60px; }
        }
        .footer-link { color: #fff; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .footer-link:hover { color: gold; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">HAMOUZI</h1>
        <div class="logo-line"></div>
        
        {% if user_email %}
            <div class="user-area">
                <div class="user-icon" title="{{ user_email }}">
                    {{ user_email[0] | upper }}
                </div>
                <a href="/logout" class="logout-link">Logout</a>
            </div>
        {% else %}
            <a href="/login" class="login-btn">Login</a>
        {% endif %}
    </div>

    <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
        <div class="wrapper">
            <div class="ad-space">ADVERTISING</div>

            <div class="box">
                <h3 style="color:gold;">Upload Image</h3>
                <input type="file" name="file" id="fileInput" hidden required>
                <label for="fileInput" id="label-text" class="upload-btn">Choose File</label>
                <div id="file-name">No file chosen</div>
                <div class="loading-container" id="loader">Processing<span class="dots"></span></div>
            </div>

            <div class="tools-container">
                <a href="/crop"><button type="button" class="tool-btn">Crop Image</button></a>
                <a href="/compress"><button type="button" class="tool-btn">Compress</button></a>
                <a href="/convert"><button type="button" class="tool-btn">Convert</button></a>
                <a href="/merge"><button type="button" class="tool-btn">Merge</button></a>
            </div>

            <div class="box">
                {% if result_image %}
                    <img src="data:image/png;base64,{{ result_image }}" style="max-width:80%; max-height:80%; border-radius:20px; box-shadow: 0 0 20px gold;">
                {% else %}
                    <h3 style="color:gold; opacity:0.4;">Preview</h3>
                    <p style="font-size:12px; opacity:0.3;">Your result here</p>
                {% endif %}
            </div>

            <div class="ad-space">ADVERTISING</div>
        </div>

        <button type="submit" class="remove-btn">🪄 Remove Background</button>
    </form>

    <div class="footer-container">
        <a href="/privacy" class="footer-link">Privacy Policy</a>
        <div style="color:rgba(255,255,255,0.4); font-size:12px;">© 2026 HAMOUZI</div>
        <a href="/contact" class="footer-link">Contact Us</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('file-name');
        const form = document.getElementById('uploadForm');
        const loader = document.getElementById('loader');
        const labelText = document.getElementById('label-text');

        fileInput.onchange = () => {
            if(fileInput.files[0]) fileName.innerText = "Selected: " + fileInput.files[0].name;
        };

        form.onsubmit = () => {
            labelText.style.display = 'none';
            fileName.style.display = 'none';
            loader.style.display = 'block';
        };
    </script>
</body>
</html>
