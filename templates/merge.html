<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HAMOUZI - AI Merge Tool</title>
    <style>
        body {
            margin: 0; font-family: sans-serif; background: #000; color: gold; 
            text-align: center; min-height: 100vh; position: relative;
        }
        body::after {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid rgba(255, 215, 0, 0.4); 
            box-shadow: inset 0 0 25px rgba(255, 215, 0, 0.3);
            pointer-events: none; z-index: 9999;
        }
        .container { padding: 50px; }
        h1 { font-size: 50px; text-shadow: 0 0 15px gold; margin-bottom: 10px; }
        .row { display: flex; justify-content: center; gap: 30px; margin-top: 30px; }
        .box {
            width: 250px; height: 300px; border: 2px dashed gold; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(255, 215, 0, 0.05); padding: 15px;
        }
        .btn {
            padding: 15px 50px; border-radius: 15px; border: 1px solid gold;
            background: transparent; color: gold; cursor: pointer;
            margin-top: 30px; font-weight: bold; font-size: 18px; transition: 0.3s;
        }
        .btn:hover { background: gold; color: #000; box-shadow: 0 0 30px gold; }
        .result-container { margin-top: 40px; }
        .result-img { max-width: 80%; border: 2px solid gold; border-radius: 20px; box-shadow: 0 0 20px gold; }
        a { color: #fff; text-decoration: none; display: block; margin-top: 30px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Photo Merge</h1>
        <p>ادمج صورتك مع أي خلفية باستخدام الذكاء الاصطناعي</p>
        
        <form action="/process_merge" method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="box">
                    <h3 style="margin-top:0;">صورة الشخص</h3>
                    <input type="file" name="person_img" required style="font-size: 12px;">
                </div>
                <div class="box">
                    <h3 style="margin-top:0;">الخلفية الجديدة</h3>
                    <input type="file" name="bg_img" required style="font-size: 12px;">
                </div>
            </div>
            <button type="submit" class="btn">ابدأ الدمج بالذكاء الاصطناعي</button>
        </form>

        {% if result_image %}
        <div class="result-container">
            <h2>النتيجة النهائية:</h2>
            <img class="result-img" src="data:image/png;base64,{{ result_image }}">
            <br>
            <a href="data:image/png;base64,{{ result_image }}" download="merged_hamouzi.png" class="btn" style="display:inline-block; margin-top:20px;">تحميل الصورة</a>
        </div>
        {% endif %}
        
        <a href="/">← العودة للرئيسية</a>
    </div>
</body>
</html>
