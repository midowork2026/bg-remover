<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HAMOUZI - Merge Tool</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: gold; text-align: center; min-height: 100vh; position: relative; }
        body::after { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; border: 4px solid rgba(255, 215, 0, 0.4); box-shadow: inset 0 0 25px rgba(255, 215, 0, 0.3); pointer-events: none; }
        .container { padding: 50px; }
        .row { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .box { width: 200px; height: 250px; border: 2px dashed gold; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; padding: 10px; }
        .btn { padding: 15px 40px; border-radius: 15px; border: 1px solid gold; background: transparent; color: gold; cursor: pointer; margin-top: 30px; font-weight: bold; }
        h1 { font-size: 50px; text-shadow: 0 0 15px gold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Merge Images</h1>
        <p>ادمج صورتك مع خلفية احترافية</p>
        <div class="row">
            <div class="box">
                <span>Main Image</span>
                <input type="file" style="margin-top:10px; font-size:10px;">
            </div>
            <div class="box">
                <span>Background</span>
                <input type="file" style="margin-top:10px; font-size:10px;">
            </div>
        </div>
        <button class="btn">Start Merging</button>
        <a href="/" style="color:#fff; display:block; margin-top:20px; text-decoration:none;">← Back to Home</a>
    </div>
</body>
</html>
